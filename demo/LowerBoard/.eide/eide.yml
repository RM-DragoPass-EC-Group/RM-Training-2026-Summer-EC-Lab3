version: "4.1"
name: LowerBoard
type: ARM
deviceName: null
packDir: null
srcDirs:
  - Core
  - Drivers
  - User
  - Libs
  - ../include
virtualFolder:
  name: <virtual_root>
  files:
    - path: startup_stm32f401xc.s
  folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: 8615141aa3a5c00a1e69f166f701960f
targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - USE_HAL_DRIVER
        - STM32F401xC
      incList:
        - User
        - Core/Inc
        - Drivers/CMSIS/Include
        - Drivers/CMSIS/Device/ST/STM32F4xx/Include
        - Drivers/STM32F4xx_HAL_Driver/Inc
        - Libs/CMSIS-DSP-1.17.0/Include
        - ../include
      libList: []
    excludeList:
      - Drivers/CMSIS/Core_A
      - Drivers/CMSIS/Core
      - Drivers/CMSIS/DAP
      - Drivers/CMSIS/Documentation
      - Drivers/CMSIS/DSP
      - Drivers/CMSIS/NN
      - Drivers/CMSIS/RTOS
      - Drivers/CMSIS/RTOS2
      - Drivers/CMSIS/Device/ST/STM32F4xx/Source
      - Drivers/STM32F4xx_HAL_Driver/Src/stm32f4xx_hal_timebase_rtc_alarm_template.c
      - Drivers/STM32F4xx_HAL_Driver/Src/stm32f4xx_hal_timebase_rtc_wakeup_template.c
      - Drivers/STM32F4xx_HAL_Driver/Src/stm32f4xx_hal_timebase_tim_template.c
      - Drivers/STM32F4xx_HAL_Driver/Src/stm32f4xx_hal_msp_template.c
    settings:
      debugger: cortex-debug
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M4
        floatingPointHardware: single
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler: {}
          beforeBuildTasks: []
          c/cpp-compiler:
            language-c: gnu17
            language-cpp: gnu++23
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: hard
            arm-thumb-mode: thumb
            callgraph-info: true
            not-use-syscalls: true
            output-debug-info: enable
            stack-usage: true
            use-newlib-nano: true
          linker:
            $outputTaskExcludes:
              - .bin
            $toolName: auto
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: STM32F401XX_FLASH.ld
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: STM32F401CC
          vendor: ST
        otherCmds: ""
        proType: 1
        speed: 4000
    uploader: JLink
